<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Neuro Lab | RIT</title>
    <style>
        /* CSS Variables for Easy Light/Dark Toggling */
        :root {
            --bg: #ffffff;
            --surface: #f6f6f6;
            --nav: #ffffff;
            --nav-text: #111111;
            --text: #111111;
            --muted: #555555;
            --accent: #F76902;
            --border: rgba(17, 17, 17, 0.08);
            --shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
            --highlight-bg: rgba(247, 105, 2, 0.14);
        }

        body.dark-mode {
            --bg: #111111;
            --surface: #1a1a1a;
            --nav: #000000;
            --nav-text: #ffffff;
            --text: #f2f2f2;
            --muted: #aaaaaa;
            --border: #333333;
            --shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
            --highlight-bg: rgba(247, 105, 2, 0.18);
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
            position: relative;
        }

        .eeg-overlay {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            opacity: 0.2;
            mix-blend-mode: multiply;
        }

        body.dark-mode .eeg-overlay {
            opacity: 0.18;
            mix-blend-mode: screen;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            padding: 1.25rem 1.5rem;
            background: var(--nav);
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 1;
        }

        nav a,
        .theme-btn {
            color: var(--nav-text);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            font-size: 0.92rem;
            transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
            text-transform: none;
            display: inline-flex;
            align-items: center;
        }

        nav a:hover,
        nav a[aria-current="page"] {
            color: var(--accent);
        }

        .github-link {
            color: var(--accent);
        }

        .theme-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 9999px;
            padding: 0.55rem 0.95rem;
            cursor: pointer;
        }

        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 2rem;
            min-height: calc(100vh - 120px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .split-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            width: 100%;
            flex-wrap: wrap;
            padding: 1rem 0;
        }

        /* Left Side: Logo */
        .left-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 360px;
            max-width: 100%;
        }

        .logo-lockup {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.1rem;
            width: 100%;
        }

        .logo-mark-scene {
            width: min(100%, 320px);
            perspective: 1200px;
        }

        .logo-mark-rotor {
            position: relative;
            width: 100%;
            aspect-ratio: 571 / 692;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 18px 30px rgba(0, 0, 0, 0.16));
        }

        .logo-mark-face {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            transform-style: preserve-3d;
        }

        .logo-mark-face.back {
            transform: rotateY(180deg);
        }

        .logo-mark {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .logo-wordmark-wrap {
            width: min(100%, 330px);
            display: flex;
            justify-content: center;
        }

        .logo-wordmark {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.12));
        }

        .theme-dark {
            display: none;
        }

        body.dark-mode .theme-light {
            display: none;
        }

        body.dark-mode .theme-dark {
            display: block;
        }

        body.idle-spin .logo-mark-rotor {
            animation: eggIdleSpin 3.6s linear infinite;
        }

        @keyframes eggIdleSpin {
            0% {
                transform: rotateX(2deg) rotateY(0deg) scaleX(1);
            }
            25% {
                transform: rotateX(2deg) rotateY(90deg) scaleX(0.92);
            }
            50% {
                transform: rotateX(2deg) rotateY(180deg) scaleX(1);
            }
            75% {
                transform: rotateX(2deg) rotateY(270deg) scaleX(0.92);
            }
            100% {
                transform: rotateX(2deg) rotateY(360deg) scaleX(1);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .eeg-overlay,
            .logo-mark-rotor {
                animation: none;
            }

            .eeg-overlay {
                display: none;
            }
        }

        /* Right Side: Academic Description */
        .right-box {
            width: 420px;
            max-width: 100%;
            box-sizing: border-box;
            background-color: var(--surface);
            border: 1px solid var(--border);
            padding: 2.25rem;
            border-radius: 22px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .right-box p {
            font-size: 1.08rem;
            line-height: 1.75;
            color: var(--muted);
            margin: 0;
            font-weight: 300;
        }

        @media (max-width: 1024px) {
            .main-content {
                padding: 4rem 1.5rem;
            }
            .split-container {
                gap: 3rem;
            }
            .logo-mark-scene {
                width: min(100%, 280px);
            }
            .logo-wordmark-wrap {
                width: min(100%, 290px);
            }
        }

        @media (max-width: 768px) {
            nav {
                padding: 1.1rem 1rem;
                gap: 1rem;
            }
            nav a, .theme-btn {
                font-size: 0.85rem;
            }
            .main-content {
                padding: 3rem 1.25rem;
            }
            .split-container {
                flex-direction: column;
                gap: 2.5rem;
            }
            .left-box, .right-box {
                width: 100%;
                text-align: center;
            }
            .logo-mark-scene {
                width: min(100%, 240px);
            }
            .logo-wordmark-wrap {
                width: min(100%, 260px);
            }
            .right-box p {
                font-size: 1.05rem;
            }
        }

        @media (max-width: 480px) {
            nav {
                gap: 0.85rem;
                padding: 1rem 0.75rem;
            }
            nav a, .theme-btn {
                font-size: 0.78rem;
            }
            .main-content {
                padding: 2.5rem 1rem;
            }
            .logo-mark-scene {
                width: min(100%, 200px);
            }
            .logo-wordmark-wrap {
                width: min(100%, 220px);
            }
            .right-box p {
                font-size: 0.98rem;
            }
        }
    </style>

<body>

    <canvas class="eeg-overlay" id="eeg-overlay" aria-hidden="true"></canvas>

    <nav>
        <a href="index.html" aria-current="page">Home</a>
        <a href="team.html">Our Team</a>
        <a href="research.html">Research</a>
        <a href="publications.html">Publications</a>
        <a href="news.html">News</a>
        <a href="join.html">Join Us</a>
        <a href="https://github.com/delta-neuro" target="_blank" class="github-link">GitHub ↗</a>
        <button id="theme-btn" class="theme-btn" aria-label="Switch to dark mode">🌙</button>
    </nav>

    <div class="main-content">
        <div class="split-container">

            <div class="left-box">
                <div class="logo-lockup">
                    <div class="logo-mark-scene" aria-hidden="true">
                        <div class="logo-mark-rotor">
                            <div class="logo-mark-face front">
                                <img src="images/deltaneuro_mark_light.png" alt="" class="logo-mark theme-light">
                                <img src="images/deltaneuro_mark_dark.png" alt="" class="logo-mark theme-dark">
                            </div>
                            <div class="logo-mark-face back">
                                <img src="images/deltaneuro_mark_light.png" alt="" class="logo-mark theme-light">
                                <img src="images/deltaneuro_mark_dark.png" alt="" class="logo-mark theme-dark">
                            </div>
                        </div>
                    </div>
                    <div class="logo-wordmark-wrap">
                        <img src="images/deltaneuro_wordmark_light.png" alt="Delta Neuro Logo" class="logo-wordmark theme-light">
                        <img src="images/deltaneuro_wordmark_dark.png" alt="Delta Neuro Logo" class="logo-wordmark theme-dark">
                    </div>
                </div>
            </div>

            <div class="right-box">
                <p id="dynamic-text">Loading content...</p>
            </div>

        </div>
    </div>

    <script>
        async function loadHomepageText() {
            try {
                const response = await fetch('text_content/homepage.txt');
                if (!response.ok) throw new Error('Text file not found');
                const text = await response.text();
                document.getElementById('dynamic-text').textContent = text;
            } catch (error) {
                const message = window.location.protocol === 'file:'
                    ? 'Unable to load text from local file. Please serve the page over HTTP or use a local server.'
                    : 'Unable to load text.';
                document.getElementById('dynamic-text').textContent = message;
                console.error('Homepage text load error:', error);
            }
        }

        function initEegOverlay() {
            const canvas = document.getElementById('eeg-overlay');
            if (!canvas || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                return;
            }

            const context = canvas.getContext('2d');
            const spikeEvents = [];
            const channelCount = 8;
            const channels = Array.from({ length: channelCount }, (_, index) => ({
                phase: Math.random() * Math.PI * 2,
                wobble: 0.8 + Math.random() * 0.7,
                amplitude: 4 + Math.random() * 3,
                baselineOffset: index,
            }));
            let width = 0;
            let height = 0;
            let devicePixelRatioValue = 1;
            let lastTimestamp = 0;
            let nextSpikeAt = 0;

            function resizeCanvas() {
                devicePixelRatioValue = window.devicePixelRatio || 1;
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = Math.floor(width * devicePixelRatioValue);
                canvas.height = Math.floor(height * devicePixelRatioValue);
                canvas.style.width = `${width}px`;
                canvas.style.height = `${height}px`;
                context.setTransform(devicePixelRatioValue, 0, 0, devicePixelRatioValue, 0, 0);
            }

            function channelY(index) {
                const top = height * 0.18;
                const bottom = height * 0.82;
                return top + ((bottom - top) / (channelCount - 1)) * index;
            }

            function themeStroke(alpha) {
                if (document.body.classList.contains('dark-mode')) {
                    return `rgba(238, 238, 238, ${alpha})`;
                }
                return `rgba(18, 18, 18, ${alpha})`;
            }

            function maybeCreateSpike(now) {
                if (now < nextSpikeAt) {
                    return;
                }

                const startChannel = Math.floor(Math.random() * channelCount);
                const span = Math.random() < 0.45 ? 1 : Math.random() < 0.8 ? 2 : 3;
                const affected = [];
                for (let offset = 0; offset < span; offset += 1) {
                    const channel = Math.min(channelCount - 1, startChannel + offset);
                    affected.push(channel);
                }

                spikeEvents.push({
                    channelIndexes: affected,
                    xStart: -140 - Math.random() * 120,
                    speed: 240 + Math.random() * 120,
                    width: 50 + Math.random() * 36,
                    height: 18 + Math.random() * 24,
                    createdAt: now,
                });

                nextSpikeAt = now + 850 + Math.random() * 1800;
            }

            function spikeContribution(channelIndex, x, now) {
                let total = 0;

                for (let index = spikeEvents.length - 1; index >= 0; index -= 1) {
                    const spike = spikeEvents[index];
                    const centerX = spike.xStart + ((now - spike.createdAt) / 1000) * spike.speed;

                    if (centerX - spike.width > width + 180) {
                        spikeEvents.splice(index, 1);
                        continue;
                    }

                    if (!spike.channelIndexes.includes(channelIndex)) {
                        continue;
                    }

                    const normalized = (x - centerX) / spike.width;
                    if (Math.abs(normalized) > 1) {
                        continue;
                    }

                    const envelope = 1 - Math.abs(normalized);
                    const polarity = normalized < 0 ? 1 : -0.45;
                    total += spike.height * envelope * polarity;
                }

                return total;
            }

            function drawChannel(channel, index, nowSeconds) {
                const baseY = channelY(index);
                const step = 8;
                context.beginPath();

                for (let x = -step; x <= width + step; x += step) {
                    const t = nowSeconds;
                    const slow = Math.sin((x * 0.012) + (t * 1.5) + channel.phase) * channel.amplitude;
                    const fast = Math.sin((x * 0.037) - (t * 4.4 * channel.wobble) + channel.phase * 0.5) * 1.6;
                    const mid = Math.sin((x * 0.024) + (t * 2.2) + index * 0.8) * 1.1;
                    const spike = spikeContribution(index, x, nowSeconds * 1000);
                    const y = baseY + slow + fast + mid - spike;

                    if (x <= 0) {
                        context.moveTo(x, y);
                    } else {
                        context.lineTo(x, y);
                    }
                }

                context.strokeStyle = themeStroke(index % 2 === 0 ? 0.26 : 0.18);
                context.lineWidth = index % 3 === 0 ? 1.7 : 1.2;
                context.stroke();
            }

            function draw(now) {
                if (!lastTimestamp) {
                    lastTimestamp = now;
                    nextSpikeAt = now + 600;
                }

                const nowSeconds = now / 1000;
                context.clearRect(0, 0, width, height);
                maybeCreateSpike(now);

                for (let index = 0; index < channelCount; index += 1) {
                    drawChannel(channels[index], index, nowSeconds);
                }

                requestAnimationFrame(draw);
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            requestAnimationFrame(draw);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadHomepageText();
            initEegOverlay();

            const idleDelayMs = 5000;
            let idleTimer;

            function clearIdleSpin() {
                document.body.classList.remove('idle-spin');
            }

            function startIdleTimer() {
                clearTimeout(idleTimer);
                clearIdleSpin();
                idleTimer = setTimeout(() => {
                    document.body.classList.add('idle-spin');
                }, idleDelayMs);
            }

            ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll'].forEach(eventName => {
                window.addEventListener(eventName, startIdleTimer, { passive: true });
            });

            startIdleTimer();
        });
    </script>

</body>
