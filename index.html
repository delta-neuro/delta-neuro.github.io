<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Neuro Lab | RIT</title>
    <style>
        /* CSS Variables for Easy Light/Dark Toggling */
        :root {
            --bg: #ffffff;
            --surface: #f6f6f6;
            --nav: #ffffff;
            --nav-text: #111111;
            --text: #111111;
            --muted: #555555;
            --accent: #F76902;
            --border: rgba(17, 17, 17, 0.08);
            --shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
            --highlight-bg: rgba(247, 105, 2, 0.14);
        }

        body.dark-mode {
            --bg: #111111;
            --surface: #1a1a1a;
            --nav: #000000;
            --nav-text: #ffffff;
            --text: #f2f2f2;
            --muted: #aaaaaa;
            --border: #333333;
            --shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
            --highlight-bg: rgba(247, 105, 2, 0.18);
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 4;
            opacity: 0.09;
            mix-blend-mode: multiply;
            background:
                linear-gradient(90deg,
                    transparent 0%,
                    transparent 34%,
                    rgba(247, 105, 2, 0.38) 48%,
                    rgba(255, 255, 255, 0.42) 50%,
                    rgba(247, 105, 2, 0.34) 52%,
                    transparent 66%,
                    transparent 100%);
            background-size: 230% 100%;
            background-position: -160% 0;
            animation: pageWaveSweep 8s linear infinite;
        }

        body.dark-mode::before {
            mix-blend-mode: screen;
            opacity: 0.08;
        }

        @keyframes pageWaveSweep {
            0% {
                background-position: -160% 0;
            }
            100% {
                background-position: 160% 0;
            }
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            padding: 1.25rem 1.5rem;
            background: var(--nav);
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 1;
        }

        nav a,
        .theme-btn {
            color: var(--nav-text);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            font-size: 0.92rem;
            transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
            text-transform: none;
            display: inline-flex;
            align-items: center;
        }

        nav a:hover,
        nav a[aria-current="page"] {
            color: var(--accent);
        }

        .github-link {
            color: var(--accent);
        }

        .theme-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 9999px;
            padding: 0.55rem 0.95rem;
            cursor: pointer;
        }

        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 2rem;
            min-height: calc(100vh - 120px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .split-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            width: 100%;
            flex-wrap: wrap;
            padding: 1rem 0;
        }

        /* Left Side: Logo */
        .left-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 320px;
            max-width: 100%;
        }

        .lab-logo {
            width: 100%;
            max-width: 320px;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
            transform-origin: 50% 48%;
            animation: logoPulse 7s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0% {
                transform: rotate(-1.8deg) scale(1);
            }
            50% {
                transform: rotate(1.8deg) scale(1.02);
            }
            100% {
                transform: rotate(-1.8deg) scale(1);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            body::before,
            .lab-logo {
                animation: none;
            }
        }

        /* Right Side: Academic Description */
        .right-box {
            width: 420px;
            max-width: 100%;
            box-sizing: border-box;
            background-color: var(--surface);
            border: 1px solid var(--border);
            padding: 2.25rem;
            border-radius: 22px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .right-box p {
            font-size: 1.08rem;
            line-height: 1.75;
            color: var(--muted);
            margin: 0;
            font-weight: 300;
        }

        @media (max-width: 1024px) {
            .main-content {
                padding: 4rem 1.5rem;
            }
            .split-container {
                gap: 3rem;
            }
            .lab-logo {
                width: 280px;
            }
        }

        @media (max-width: 768px) {
            nav {
                padding: 1.1rem 1rem;
                gap: 1rem;
            }
            nav a, .theme-btn {
                font-size: 0.85rem;
            }
            .main-content {
                padding: 3rem 1.25rem;
            }
            .split-container {
                flex-direction: column;
                gap: 2.5rem;
            }
            .left-box, .right-box {
                width: 100%;
                text-align: center;
            }
            .lab-logo {
                width: 240px;
                animation-duration: 8s;
            }
            .right-box p {
                font-size: 1.05rem;
            }
        }

        @media (max-width: 480px) {
            nav {
                gap: 0.85rem;
                padding: 1rem 0.75rem;
            }
            nav a, .theme-btn {
                font-size: 0.78rem;
            }
            .main-content {
                padding: 2.5rem 1rem;
            }
            .lab-logo {
                width: 200px;
            }
            .right-box p {
                font-size: 0.98rem;
            }
        }
    </style>
    <script defer src="theme.js"></script>

</head>

<body>

    <nav>
        <a href="index.html" aria-current="page">Home</a>
        <a href="team.html">Our Team</a>
        <a href="research.html">Research</a>
        <a href="publications.html">Publications</a>
        <a href="news.html">News</a>
        <a href="join.html">Join Us</a>
        <a href="https://github.com/delta-neuro" target="_blank" class="github-link">GitHub ↗</a>
        <button id="theme-btn" class="theme-btn" aria-label="Switch to dark mode">🌙</button>
    </nav>

    <div class="main-content">
        <div class="split-container">

            <div class="left-box">
                <img src="images/deltaneuro_yaxis.png" alt="Delta Neuro Logo" class="lab-logo">
            </div>

            <div class="right-box">
                <p id="dynamic-text">Loading content...</p>
            </div>

        </div>
    </div>

    <script>
        async function loadHomepageText() {
            try {
                const response = await fetch('text_content/homepage.txt');
                if (!response.ok) throw new Error('Text file not found');
                const text = await response.text();
                document.getElementById('dynamic-text').textContent = text;
            } catch (error) {
                const message = window.location.protocol === 'file:'
                    ? 'Unable to load text from local file. Please serve the page over HTTP or use a local server.'
                    : 'Unable to load text.';
                document.getElementById('dynamic-text').textContent = message;
                console.error('Homepage text load error:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadHomepageText();
        });
    </script>

</body>

</html>
