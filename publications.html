<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Neuro Lab | Publications</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #111111;
            --text-secondary: #5f6368;
            --rit-orange: #F76902;
            --nav-bg: #ffffff;
            --nav-text: #111111;
            --surface: #ffffff;
            --border-color: #e5e7eb;
            --tag-bg: #F76902;
            --tag-text: #ffffff;
            --highlight-bg: rgba(247, 105, 2, 0.14);
        }

        body.dark-mode {
            --bg-color: #111111;
            --text-main: #f2f2f2;
            --text-secondary: #bdbdbd;
            --nav-bg: #000000;
            --nav-text: #ffffff;
            --surface: #1a1a1a;
            --border-color: #333333;
            --tag-bg: #fb923c;
            --highlight-bg: rgba(247, 105, 2, 0.18);
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 1.25rem 1.5rem;
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--border-color);
        }

        nav a {
            color: var(--nav-text);
            text-decoration: none;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.88rem;
            transition: color 0.2s;
        }

        nav a:hover,
        nav a[aria-current="page"] {
            color: var(--rit-orange);
        }

        .theme-btn {
            border: 1px solid var(--border-color);
            background: transparent;
            padding: 0.65rem 0.9rem;
            border-radius: 0.65rem;
            cursor: pointer;
            color: var(--nav-text);
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }

        .theme-btn:hover {
            background-color: rgba(247, 105, 2, 0.08);
        }

        .page {
            max-width: 1300px;
            margin: 0 auto;
            padding: 3rem 1.5rem 3rem;
        }

        .layout {
            display: grid;
            grid-template-columns: 180px minmax(0, 1fr);
            gap: 3rem;
        }

        .sidebar {
            position: sticky;
            top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border-right: 1px solid var(--border-color);
            padding-right: 1rem;
        }

        .sidebar h2 {
            margin: 0 0 1rem;
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-secondary);
            text-align: right;
        }

        .year-list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .year-btn {
            background: transparent;
            border: none;
            text-align: right;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0.5rem;
            font-family: inherit;
            width: 100%;
        }

        .year-btn:hover {
            color: var(--rit-orange);
        }

        .year-btn.active {
            color: var(--text-main);
            font-weight: 800;
        }

        .content {
            display: grid;
            gap: 1.5rem;
            width: 100%;
        }

        .filter-box {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
            justify-content: space-between;
        }

        .filter-box label {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .filter-box input {
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-color);
            border-radius: 0.85rem;
            padding: 0.9rem 1rem;
            font-size: 0.95rem;
            color: var(--text-main);
            background: var(--surface);
        }

        .filter-box input:focus {
            outline: none;
            border-color: var(--rit-orange);
            box-shadow: 0 0 0 4px rgba(247, 105, 2, 0.08);
        }

        .entries {
            display: grid;
            gap: 1.6rem;
        }

        .entry {
            display: grid;
            gap: 0.9rem;
            padding: 1.4rem 1.45rem;
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 1.1rem;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .entry:hover {
            border-color: rgba(247, 105, 2, 0.45);
            transform: translateY(-1px);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.06);
        }

        .entry-tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.45rem 0.95rem;
            border-radius: 999px;
            background: var(--tag-bg);
            color: var(--tag-text);
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            width: 260px;
            text-align: center;
            line-height: 1.3;
        }

        .entry-title {
            margin: 0;
            font-size: 1.1rem;
            line-height: 1.45;
            font-weight: 700;
        }

        .entry-title .highlight {
            display: inline-block;
            background: var(--highlight-bg);
            padding: 0.12rem 0.28rem;
            border-radius: 0.35rem;
        }

        .entry-meta {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .entry-meta .journal {
            font-style: italic;
            color: var(--text-secondary);
        }

        .entry-year {
            margin-top: 0.45rem;
            font-size: 0.88rem;
            color: var(--text-secondary);
        }

        .entry-status {
            margin: 0.35rem 0 0;
            font-size: 0.92rem;
            color: var(--rit-orange);
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .entry-subtext {
            margin: 0.35rem 0 0;
            font-size: 0.92rem;
            color: var(--text-secondary);
        }

        .entry-link {
            margin-top: 0.7rem;
        }

        .entry-link a {
            color: var(--rit-orange);
            text-decoration: none;
        }

        .entry.hidden {
            display: none !important;
        }

        @media (max-width: 980px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                flex-direction: row;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 1rem;
                margin-bottom: 1.5rem;
                overflow-x: auto;
            }

            .sidebar h2 {
                display: none;
            }

            .year-list {
                flex-direction: row;
                width: 100%;
                gap: 0.5rem;
            }

            .year-btn {
                text-align: center;
                white-space: nowrap;
                width: auto;
            }
        }

        @media (max-width: 680px) {
            nav {
                justify-content: space-between;
                padding: 1rem;
            }

            .page {
                padding: 1.5rem 1rem 2.2rem;
            }

            .filter-box {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-box input {
                max-width: 100%;
            }
        }
    </style>
    <script defer src="theme.js"></script>
</head>

<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="team.html">Our Team</a>
        <a href="research.html">Research</a>
        <a href="publications.html" aria-current="page">Publications</a>
        <a href="news.html">News</a>
        <a href="join.html">Join Us</a>
        <a href="https://github.com/delta-neuro" target="_blank" class="github-link">GitHub ↗</a>
        <button id="theme-btn" class="theme-btn" aria-label="Switch to dark mode">🌙</button>
    </nav>

    <main class="page">
        <div class="layout">
            <aside class="sidebar">
                <ul class="year-list" id="year-list"></ul>
            </aside>

            <section class="content">
                <div class="filter-box">
                    <label for="filter-input">Type to filter</label>
                    <input id="filter-input" type="search" placeholder="Type to filter"
                        aria-label="Type to filter publications">
                </div>

                <div class="entries" id="publication-list">
                    <div id="loading-message">Loading publications…</div>
                </div>
            </section>
        </div>
    </main>

    <script>
        function applyTheme(theme) {
            const isDark = theme === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            document.querySelectorAll('#theme-btn').forEach(button => {
                button.textContent = isDark ? '☀️' : '🌙';
                button.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
            });
        }

        function loadThemePreference() {
            const savedTheme = localStorage.getItem('delta-neuro-theme');
            if (savedTheme === 'dark' || savedTheme === 'light') {
                return savedTheme;
            }
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function setTheme(theme) {
            localStorage.setItem('delta-neuro-theme', theme);
            applyTheme(theme);
        }

        function toggleTheme() {
            const isDark = document.body.classList.contains('dark-mode');
            setTheme(isDark ? 'light' : 'dark');
        }

        function createEntryCard(entry) {
            const article = document.createElement('article');
            article.className = 'entry';
            article.dataset.year = entry.year;
            const keywords = [
                entry.keywords,
                entry.title,
                entry.authors,
                entry.venue,
                entry.notes,
                entry.category,
                entry.type
            ].filter(Boolean).join(' ').toLowerCase();
            article.dataset.keywords = keywords;

            let tagText = entry.status;
            if (entry.status === 'Published') {
                tagText = entry.venue;
            } else if (entry.status === 'Under Review') {
                tagText = 'Under review';
            } else if (entry.status === 'In Press') {
                tagText = entry.venue;
            }

            const noteText = entry.notes ? `, ${entry.notes}` : '';
            const venueText = (entry.status === 'Under Review' && entry.venue === 'In review') ? '' : (entry.status === 'In Press' ? entry.notes : entry.venue);
            const venueHtml = venueText || noteText ? `<p class="entry-meta journal">${venueText}${noteText}</p>` : '';
            const yearCategoryHtml = entry.status === 'Under Review' ? '' : `<p class="entry-year">${entry.year} · ${entry.category}</p>`;
            const abstractHtml = entry.status === 'Under Review' ? '' : `<p class="entry-subtext">${entry.abstract}</p>`;
            const linkHtml = entry.url ? `<p class="entry-link"><a href="${entry.url}" target="_blank" rel="noopener">View publication</a></p>` : '';

            const authorsBold = entry.authors.replace(/J\. Thomas/g, '<strong>J. Thomas</strong>');

            article.innerHTML = `
                <span class="entry-tag">${tagText}</span>
                <h2 class="entry-title"><span class="highlight">${entry.title}</span></h2>
                <p class="entry-meta">${authorsBold}</p>
            `;
            return article;
        }

        function renderYearList(entries) {
            const yearList = document.getElementById('year-list');
            const years = ['All', ...[...new Set(entries.map(item => item.year))].sort((a, b) => b - a)];
            yearList.innerHTML = years.map((year, index) => `
                <li><button class="year-btn${index === 0 ? ' active' : ''}" data-year="${year}">${year}</button></li>
            `).join('');
            // Add event listeners
            const yearItems = yearList.querySelectorAll('.year-btn');
            yearItems.forEach(item => {
                item.addEventListener('click', () => {
                    yearItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const selectedYear = item.dataset.year === 'All' ? null : parseInt(item.dataset.year);
                    filterByYear(selectedYear);
                });
            });
        }

        let activeYear = null; // tracks the currently selected year

        function filterByYear(year) {
            activeYear = year;
            applyFilters();
        }

        function filterEntries() {
            applyFilters();
        }

        function applyFilters() {
            const filterInput = document.getElementById('filter-input');
            const query = filterInput.value.trim().toLowerCase();
            const allEntries = document.querySelectorAll('.entry');

            allEntries.forEach(entry => {
                const entryYear = parseInt(entry.dataset.year);
                const matchesYear = !activeYear || entryYear === activeYear;

                const keywords = (entry.dataset.keywords || '').toLowerCase();
                const title = entry.querySelector('.entry-title').textContent.toLowerCase();
                const matchesSearch = !query || keywords.includes(query) || title.includes(query);

                if (matchesYear && matchesSearch) {
                    entry.classList.remove('hidden');
                } else {
                    entry.classList.add('hidden');
                }
            });
        }

        async function initPublications() {
            const list = document.getElementById('publication-list');
            const loading = document.getElementById('loading-message');
            try {
                const manifestResponse = await fetch('publications/index.json');
                if (!manifestResponse.ok) throw new Error('Could not load publication manifest');
                const manifest = await manifestResponse.json();
                const entries = await Promise.all(manifest.entries.map(async item => {
                    const entryResponse = await fetch(`publications/${item.file}`);
                    if (!entryResponse.ok) throw new Error(`Could not load ${item.file}`);
                    return entryResponse.json();
                }));
                entries.sort((a, b) => b.year - a.year || a.title.localeCompare(b.title));
                renderYearList(entries);
                list.innerHTML = '';
                entries.forEach(entry => list.appendChild(createEntryCard(entry)));
                const entryCards = Array.from(list.querySelectorAll('.entry'));
                document.getElementById('filter-input').addEventListener('input', filterEntries);
            } catch (error) {
                list.innerHTML = '<p class="error-message">Unable to load publications. Please serve this site from a web server or check the publications folder.</p>';
                console.error(error);
            } finally {
                if (loading) loading.remove();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyTheme(loadThemePreference());
            document.querySelectorAll('#theme-btn').forEach(button => button.addEventListener('click', toggleTheme));
            initPublications();
        });
    </script>
</body>

</html>
